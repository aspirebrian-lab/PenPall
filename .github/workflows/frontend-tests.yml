name: Frontend (Vite) - Test + Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: writers-companion-app/client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: writers-companion-app/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Vitest)
        env:
          CI: true
        run: npm test

      - name: Build (Vite)
        env:
          CI: true
        run: npm run build