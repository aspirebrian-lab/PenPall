name: SonarCloud

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install client dependencies
        working-directory: writers-companion-app/client
        run: npm ci

      - name: Install server dependencies
        working-directory: writers-companion-app/server
        run: npm ci

      - name: Run client coverage
        working-directory: writers-companion-app/client
        run: npm run test:coverage

      - name: Run server coverage
        working-directory: writers-companion-app/server
        run: npm run test:coverage

      - name: Build client
        working-directory: writers-companion-app/client
        run: npm run build

      - name: Build server
        working-directory: writers-companion-app/server
        run: npm run build

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io