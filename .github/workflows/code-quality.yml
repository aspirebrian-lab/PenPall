name: Code Quality and Smell Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write
  issues: write

jobs:
  codeql:
    name: CodeQL (security + quality)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: +security-and-quality

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3

  semgrep:
    name: Semgrep (code smells + vuln patterns)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/typescript
            p/react
            p/security-audit
          generateSarif: "1"

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  eslint_and_audit:
    name: ESLint + npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: writers-companion-app/client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: writers-companion-app/client/package-lock.json

      - name: Install deps
        run: npm ci

      - name: ESLint JSON report
        run: |
          npx eslint "src/**/*.{js,jsx,ts,tsx}" -f json -o eslint-report.json || true

      - name: npm audit JSON report
        run: |
          npm audit --json > npm-audit.json || true

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            writers-companion-app/client/eslint-report.json
            writers-companion-app/client/npm-audit.json

  create_ticket:
    name: Create/Update quality ticket
    runs-on: ubuntu-latest
    needs: [eslint_and_audit, codeql, semgrep]
    if: github.event_name != 'pull_request'
    steps:
      - name: Download quality artifacts
        uses: actions/download-artifact@v4
        with:
          name: quality-reports
          path: reports

      - name: Create or update GitHub issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueTitle = 'Automated Quality Report';
            const labels = ['quality-report', 'tech-debt', 'automated'];

            // Ensure labels exist
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch {
                await github.rest.issues.createLabel({
                  owner, repo, name: label, color: '5319e7'
                });
              }
            }

            // Parse ESLint report
            let eslintSummary = { files: 0, errors: 0, warnings: 0, topRules: [] };
            try {
              const eslintRaw = fs.readFileSync('reports/eslint-report.json', 'utf8');
              const eslint = JSON.parse(eslintRaw);
              eslintSummary.files = eslint.length;
              const ruleCounts = {};
              for (const file of eslint) {
                for (const m of (file.messages || [])) {
                  if (m.severity === 2) eslintSummary.errors += 1;
                  if (m.severity === 1) eslintSummary.warnings += 1;
                  const rule = m.ruleId || 'unknown';
                  ruleCounts[rule] = (ruleCounts[rule] || 0) + 1;
                }
              }
              eslintSummary.topRules = Object.entries(ruleCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);
            } catch {}

            // Parse npm audit report
            let auditSummary = { vulnerabilities: 0, bySeverity: {} };
            try {
              const auditRaw = fs.readFileSync('reports/npm-audit.json', 'utf8');
              const audit = JSON.parse(auditRaw);
              const vulns = audit.vulnerabilities || {};
              auditSummary.vulnerabilities = Object.keys(vulns).length;
              const sev = { critical: 0, high: 0, moderate: 0, low: 0, info: 0 };
              for (const [, v] of Object.entries(vulns)) {
                const s = (v.severity || 'info').toLowerCase();
                if (sev[s] !== undefined) sev[s] += 1;
                else sev.info += 1;
              }
              auditSummary.bySeverity = sev;
            } catch {}

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              `## Automated Quality Report`,
              ``,
              `- Run: ${runUrl}`,
              `- Commit: \`${context.sha}\``,
              `- Generated: ${new Date().toISOString()}`,
              ``,
              `### ESLint`,
              `- Files scanned: ${eslintSummary.files}`,
              `- Errors: ${eslintSummary.errors}`,
              `- Warnings: ${eslintSummary.warnings}`,
              ``,
              `Top rules:`,
              ...(eslintSummary.topRules.length
                ? eslintSummary.topRules.map(([rule, count]) => `- \`${rule}\`: ${count}`)
                : ['- none']),
              ``,
              `### npm audit`,
              `- Vulnerable packages: ${auditSummary.vulnerabilities}`,
              `- By severity: \`${JSON.stringify(auditSummary.bySeverity)}\``,
              ``,
              `### Code Scanning`,
              `- Review CodeQL/Semgrep alerts in the Security tab.`,
            ].join('\n');

            const q = `repo:${owner}/${repo} is:issue is:open in:title "${issueTitle}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q });

            if (existing.data.items.length > 0) {
              const issueNumber = existing.data.items[0].number;
              await github.rest.issues.update({
                owner, repo, issue_number: issueNumber, body, labels
              });
              core.info(`Updated issue #${issueNumber}`);
            } else {
              const created = await github.rest.issues.create({
                owner, repo, title: issueTitle, body, labels
              });
              core.info(`Created issue #${created.data.number}`);
            }